name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyse:
    name: Analyse ${{ matrix.language }}
    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
          - language: go

    steps:
      - name: Reset workspace ownership
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R $(id -u):$(id -g) /ws 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: |
            agent/go.sum
            apps/ingest/go.sum

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # js/disabling-certificate-validation fires on the intentional rejectUnauthorized: false
          # in lib/certificates/fetch.ts, which exists to retrieve certs from TLS endpoints that
          # may be self-signed or expired. The SSRF denylist in that function ensures only public
          # IPs are reachable. Inline lgtm[] comments do not suppress this rule in CodeQL v4.
          config: |
            query-filters:
              - exclude:
                  id: js/disabling-certificate-validation

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyse
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
