name: "CodeQL config"

# Exclude the certificate-inspection helper from the rejectUnauthorized check.
# fetchCertPemsFromUrl intentionally uses rejectUnauthorized: false because its
# sole purpose is to retrieve TLS certificates from servers that may be
# self-signed or expired. The SSRF denylist in fetchCertificateFromUrl ensures
# only public IPs are reachable before this function is called.
query-filters:
  - exclude:
      id: js/disabling-certificate-validation

# Belt-and-suspenders: also exclude the file from all queries so a CodeQL
# database version change cannot re-surface the alert.
paths-ignore:
  - apps/web/lib/certificates/fetch.ts
